<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
body{margin:0;background:#000;color:white;font-family:Arial,sans-serif;min-height:100vh;overflow-x:hidden}.header{padding:18px;text-align:center;font-size:28px;font-weight:bold;border-bottom:1px solid #222}.container{padding:16px;padding-bottom:120px}.note-area{width:100%;min-height:280px;background:#111;color:white;border:1px solid #333;border-radius:10px;padding:14px;font-size:17px;box-sizing:border-box;outline:none;resize:vertical;margin-bottom:18px}.strip{background:white;color:black;padding:16px;margin-bottom:12px;border-radius:10px;font-size:18px;font-weight:bold;user-select:none}.strip.dragging{opacity:.5}.strip.drop-target{outline:4px solid #00ff88}.plus-btn,.mic-btn,.calendar-btn{position:fixed;bottom:18px;width:58px;height:58px;border-radius:50%;border:none;background:white;color:black;font-size:30px;font-weight:bold;display:flex;align-items:center;justify-content:center}.plus-btn{left:18px}.calendar-btn{left:50%;transform:translateX(-50%)}.mic-btn{right:18px}.mic-btn svg,.calendar-btn svg{width:30px;height:30px}.mic-btn.recording{background:red;color:white}.back-btn{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);padding:12px 18px;border-radius:30px;border:none;background:white;color:black;font-weight:bold}.status{text-align:center;color:#aaa;font-size:14px;margin-bottom:10px}
</style>
</head>

<body>
<div class="header" id="pageTitle">Notes</div>
<div class="container"><div class="status" id="statusText"></div><div id="content"></div></div>

<button class="plus-btn" onclick="addHeading()">+</button>

<button class="calendar-btn" onclick="addDateHeading()" aria-label="Add date heading">
<svg viewBox="0 0 24 24" fill="currentColor">
<path d="M7 2h2v2h6V2h2v2h3c1.1 0 2 .9 2 2v14c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2h3V2zm13 8H4v10h16V10zM4 8h16V6H4v2z"></path>
</svg>
</button>

<button class="back-btn" id="backBtn" onclick="goBack()" style="display:none;">Back</button>

<button class="mic-btn" id="micBtn" onclick="toggleMic()" aria-label="Mic">
<svg viewBox="0 0 24 24" fill="currentColor">
<path d="M12 14c1.7 0 3-1.3 3-3V5c0-1.7-1.3-3-3-3S9 3.3 9 5v6c0 1.7 1.3 3 3 3z"></path>
<path d="M17.3 11c0 3-2.5 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.4 2.7 6.2 6 6.7V21h2v-3.3c3.3-.5 6-3.3 6-6.7h-1.7z"></path>
</svg>
</button>

<script>
var saved=localStorage.getItem("nestedNotes");
var data=saved?JSON.parse(saved):{title:"Notes",text:"",children:[]};
var path=[];var recognition=null;var isRecording=false;var activeTextarea=null;var pressTimer=null;var startX=0;var startY=0;var currentIndex=null;var longPressed=false;var dragging=false;var ignoreNextTap=false;

function saveData(){localStorage.setItem("nestedNotes",JSON.stringify(data));}

function getCurrentNode(){
  var node=data;
  for(var i=0;i<path.length;i++){node=node.children[path[i]];}
  return node;
}

function render(){
  var node=getCurrentNode();
  var content=document.getElementById("content");
  var backBtn=document.getElementById("backBtn");
  document.getElementById("pageTitle").innerText=node.title;
  backBtn.style.display=path.length>0?"block":"none";
  content.innerHTML="";

  var textarea=document.createElement("textarea");
  textarea.className="note-area";
  textarea.placeholder="Write your notes here, or tap the mic and speak...";
  textarea.value=node.text||"";
  textarea.oninput=function(){node.text=textarea.value;saveData();};
  activeTextarea=textarea;
  content.appendChild(textarea);

  for(var i=0;i<node.children.length;i++){createStrip(i);}
}

function createStrip(index){
  var node=getCurrentNode();
  var content=document.getElementById("content");
  var strip=document.createElement("div");
  strip.className="strip";
  strip.innerText=node.children[index].title||"Untitled";
  strip.setAttribute("data-index",index);

  strip.addEventListener("touchstart",function(e){
    var t=e.touches[0];
    startX=t.clientX;startY=t.clientY;currentIndex=index;
    longPressed=false;dragging=false;
    pressTimer=setTimeout(function(){
      longPressed=true;
      document.getElementById("statusText").innerText="Move to drag, release without moving for options";
    },650);
  });

  strip.addEventListener("touchmove",function(e){
    if(!longPressed)return;
    var t=e.touches[0];
    var moveX=Math.abs(t.clientX-startX);
    var moveY=Math.abs(t.clientY-startY);

    if(moveX>12||moveY>12){
      dragging=true;
      strip.classList.add("dragging");
      var target=document.elementFromPoint(t.clientX,t.clientY);
      clearTargets();

      if(target&&target.classList.contains("strip")&&target!==strip){
        target.classList.add("drop-target");
      }

      e.preventDefault();
    }
  });

  strip.addEventListener("touchend",function(e){
    clearTimeout(pressTimer);

    if(dragging){
      var t=e.changedTouches[0];
      var target=document.elementFromPoint(t.clientX,t.clientY);
      strip.classList.remove("dragging");

      if(target&&target.classList.contains("strip")){
        var targetIndex=Number(target.getAttribute("data-index"));
        if(targetIndex!==currentIndex){moveInside(currentIndex,targetIndex);}
      }else{
        reorder(currentIndex,t.clientY);
      }

      clearTargets();
      resetTouch();
      ignoreNextTap=true;
      setTimeout(function(){ignoreNextTap=false;},500);
      return;
    }

    if(longPressed){
      showOptions(index);
      resetTouch();
      ignoreNextTap=true;
      setTimeout(function(){ignoreNextTap=false;},500);
      return;
    }

    if(!ignoreNextTap){openHeading(index);}
    resetTouch();
  });

  content.appendChild(strip);
}

function resetTouch(){
  currentIndex=null;
  longPressed=false;
  dragging=false;
  document.getElementById("statusText").innerText="";
}

function showOptions(index){
  var choice=prompt("Choose option:\n1 = Edit\n2 = Delete\n3 = Cancel");
  if(choice==="1"){editHeading(index);}
  else if(choice==="2"){deleteHeading(index);}
}

function editHeading(index){
  var node=getCurrentNode();
  var title=prompt("Edit heading:",node.children[index].title);
  if(title&&title.trim()!==""){
    node.children[index].title=title.trim();
    saveData();
    render();
  }
}

function deleteHeading(index){
  var node=getCurrentNode();
  if(confirm("Delete this heading and everything inside it?")){
    node.children.splice(index,1);
    saveData();
    render();
  }
}

function clearTargets(){
  var strips=document.querySelectorAll(".strip");
  for(var i=0;i<strips.length;i++){strips[i].classList.remove("drop-target");}
}

function reorder(fromIndex,yPosition){
  var node=getCurrentNode();
  var strips=document.querySelectorAll(".strip");
  var toIndex=fromIndex;

  for(var i=0;i<strips.length;i++){
    var rect=strips[i].getBoundingClientRect();
    if(yPosition<rect.top+rect.height/2){toIndex=i;break;}
    toIndex=i;
  }

  if(fromIndex===toIndex)return;

  var item=node.children.splice(fromIndex,1)[0];
  if(fromIndex<toIndex){toIndex=toIndex-1;}
  node.children.splice(toIndex,0,item);
  saveData();
  render();
}

function moveInside(fromIndex,targetIndex){
  var node=getCurrentNode();
  if(fromIndex===targetIndex)return;

  var item=node.children.splice(fromIndex,1)[0];
  if(fromIndex<targetIndex){targetIndex=targetIndex-1;}
  node.children[targetIndex].children.push(item);

  saveData();
  render();

  ignoreNextTap=true;
  setTimeout(function(){ignoreNextTap=false;},700);
}

function addHeading(){
  var node=getCurrentNode();
  var title=prompt("Enter heading:");
  if(title&&title.trim()!==""){
    node.children.push({title:title.trim(),text:"",children:[]});
    saveData();
    render();
  }
}

function getDateHeading(){
  var d=new Date();
  var day=d.getDate();
  var monthNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var month=monthNames[d.getMonth()];
  var year=d.getFullYear();

  var suffix="th";
  if(day%10===1&&day!==11)suffix="st";
  else if(day%10===2&&day!==12)suffix="nd";
  else if(day%10===3&&day!==13)suffix="rd";

  return day+suffix+"-"+month+"-"+year;
}

function addDateHeading(){
  var node=getCurrentNode();
  var title=getDateHeading();
  node.children.push({title:title,text:"",children:[]});
  saveData();
  render();
}

function openHeading(index){
  if(ignoreNextTap)return;
  stopMic();
  path.push(index);
  render();
  ignoreNextTap=true;
  setTimeout(function(){ignoreNextTap=false;},500);
}

function goBack(){
  stopMic();
  path.pop();
  render();
  ignoreNextTap=true;
  setTimeout(function(){ignoreNextTap=false;},500);
}

function setupMic(){
  var SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("Speech recognition is not supported. Use Chrome.");
    return null;
  }

  var r=new SpeechRecognition();
  r.continuous=true;
  r.interimResults=false;
  r.lang="en-IN";

  r.onstart=function(){
    isRecording=true;
    document.getElementById("micBtn").classList.add("recording");
    document.getElementById("statusText").innerText="Listening...";
  };

  r.onresult=function(event){
    var text="";
    for(var i=event.resultIndex;i<event.results.length;i++){
      if(event.results[i].isFinal){
        text+=event.results[i][0].transcript+" ";
      }
    }

    text=text.trim();

    if(text!==""){
      var node=getCurrentNode();
      var existing=node.text||"";

      if(!existing.endsWith(text)){
        node.text=existing?existing+" "+text:text;
      }

      saveData();

      if(activeTextarea){
        activeTextarea.value=node.text;
      }
    }
  };

  r.onend=function(){
    isRecording=false;
    document.getElementById("micBtn").classList.remove("recording");
    document.getElementById("statusText").innerText="";
  };

  return r;
}

function toggleMic(){
  if(isRecording){stopMic();}
  else{startMic();}
}

function startMic(){
  recognition=setupMic();
  if(recognition){recognition.start();}
}

function stopMic(){
  if(recognition&&isRecording){recognition.stop();}
  isRecording=false;
  document.getElementById("micBtn").classList.remove("recording");
}

render();
</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
